services:
  app:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "3000:3000"
    #depends_on:
    #  postgres:
    #    condition: service_healthy
    networks:
      - financeiro-network
    restart: unless-stopped

networks:
  financeiro-network:
    driver: bridge